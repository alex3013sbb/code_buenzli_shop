<div class="card order-card shadow-sm">
  <div class="card-body d-flex align-items-center gap-3">
    <div class="flex-grow-1">
      <h5 class="card-title mb-2">{{ productName() }}</h5>
      <p class="mb-0 text-muted">
        <span class="fw-semibold">Preis:</span>
        {{ pricePerItem() }} CHF
        <span class="mx-2 text-secondary">|</span>
        <span class="fw-semibold">Menge:</span>
        {{ quantity() }} St.
      </p>
    </div>

    <div class="order-status d-flex flex-column justify-content-center align-items-center ps-3 border-start">
      <div class="text-uppercase text-muted small mb-2">Status</div>
      <div class="badge bg-info text-dark mb-3">{{ status() }}</div>
      <div class="text-center">
        <div class="small text-muted">Gesamtpreis</div>
        <div class="h5 mb-0">{{ totalPrice() }} CHF</div>
      </div>
    </div>
  </div>
</div>
