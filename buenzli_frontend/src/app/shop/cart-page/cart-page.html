<app-header></app-header>

<div class="cart-page container py-4">
  <div class="card p-4 shadow-sm">
    <h3 class="mb-4">Shopping Cart</h3>

    <div class="cart-items mb-4">
      @for (item of cartProducts(); track $index) {
        <div class="cart-item d-flex justify-content-between align-items-center py-3 border-bottom">
          <div>
            <div class="fw-semibold mb-1">{{ item.product?.name ?? 'Unknown product' }}</div>
            <div class="text-muted small">Quantity: {{ item.quantity }}</div>
          </div>
          <div class="text-end">
            <div>{{ item.priceAtMoment }} CHF</div>
            <div class="text-muted small">each</div>
          </div>
        </div>
      }
    </div>

    <div class="cart-summary d-flex justify-content-between align-items-center py-3 border-top">
      <div class="fw-semibold">Total</div>
      <div class="h5 mb-0">{{ total() }} CHF</div>
    </div>

    <div class="text-end mt-4">
      <button class="btn btn-primary" (click)="placeOrder()">Bestellen</button>
    </div>
  </div>
</div>
